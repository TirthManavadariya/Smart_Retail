<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShelfIQ | Retail Intelligence</title>
    <meta name="description" content="ShelfIQ Smart Retail Shelf Intelligence Dashboard — AI-powered shelf monitoring, demand forecasting, and planogram compliance.">
    <link rel="icon" href="https://img.icons8.com/fluency/48/barcode-scanner.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0b1323', surface: { lowest: '#060e1e', low: '#141b2c', DEFAULT: '#182030', high: '#222a3b', highest: '#2d3546', bright: '#31394b' },
                        primary: { DEFAULT: '#6ee6ee', container: '#4ecad2', fixed: '#7df4fc', dim: '#5ed8e0' },
                        on: { surface: '#dbe2f9', 'surface-variant': '#bcc9ca', primary: '#00373a' },
                        outline: { DEFAULT: '#869394', variant: '#3d494a' },
                        error: '#ffb4ab', secondary: '#cecb5b',
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-bg text-on-surface font-sans min-h-screen flex">

    <!-- ═══════════════ SIDEBAR ═══════════════ -->
    <aside id="sidebar" class="w-[240px] min-w-[240px] bg-[#0a0e1a] flex flex-col h-screen sticky top-0 z-50">
        <!-- Branding -->
        <div class="px-5 pt-6 pb-2">
            <div class="flex items-center gap-2.5">
                <div class="w-[34px] h-[34px] rounded-lg bg-gradient-to-br from-primary-container to-primary flex items-center justify-center text-on-primary text-base">🛒</div>
                <div>
                    <div class="text-[1.15rem] font-extrabold text-on-surface">Intelligence</div>
                    <div class="text-[0.6rem] uppercase tracking-[0.2em] text-outline">Shelf Aperture</div>
                </div>
            </div>
        </div>

        <div class="h-4"></div>

        <!-- Navigation -->
        <nav id="nav-list" class="flex-1 flex flex-col gap-0.5 px-2"></nav>

        <!-- Store Selector -->
        <div class="px-4 pb-3">
            <label class="text-[0.7rem] uppercase tracking-wider text-on-surface-variant font-medium block mb-1">Active Store</label>
            <select id="store-selector" class="w-full bg-surface border border-outline-variant/20 rounded-lg px-3 py-2 text-sm text-on-surface focus:outline-none focus:border-primary/40"></select>
        </div>

        <!-- User Profile -->
        <div class="p-4">
            <div class="bg-surface-low/95 rounded-xl p-3 flex items-center gap-2.5 border border-outline-variant/10">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-primary-container to-primary flex items-center justify-center text-on-primary font-bold text-[0.8rem]">AS</div>
                <div>
                    <div class="text-on-surface font-semibold text-[0.82rem]">Arjun Sharma</div>
                    <div class="text-outline text-[0.68rem]">Store Lead</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
    <main id="app" class="flex-1 min-h-screen p-8 overflow-y-auto"></main>

    <!-- ═══════════════ JS MODULES ═══════════════ -->
    <script src="js/api.js"></script>
    <script src="js/components/kpiCard.js"></script>
    <script src="js/components/alertCard.js"></script>
    <script src="js/components/charts.js"></script>
    <script src="js/components/tables.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/liveMonitor.js"></script>
    <script src="js/pages/shelfAnalysis.js"></script>
    <script src="js/pages/shelfOptimizer.js"></script>
    <script src="js/pages/forecast.js"></script>
    <script src="js/pages/alerts.js"></script>
    <script src="js/pages/smartStore.js"></script>
    <script src="js/pages/settings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
