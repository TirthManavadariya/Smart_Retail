<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Prama Smart Retail Intelligence | Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#869394",
                        "surface-variant": "#2d3546",
                        "surface-container-high": "#222a3b",
                        "on-primary-fixed": "#002022",
                        "on-tertiary": "#2e3133",
                        "surface-dim": "#0b1323",
                        "primary": "#6ee6ee",
                        "on-tertiary-container": "#474a4b",
                        "on-surface": "#dbe2f9",
                        "surface-container-low": "#141b2c",
                        "primary-container": "#4ecad2",
                        "inverse-surface": "#dbe2f9",
                        "tertiary-container": "#b7b9bb",
                        "on-tertiary-fixed": "#191c1e",
                        "secondary-container": "#757302",
                        "tertiary": "#d3d5d7",
                        "primary-fixed-dim": "#5ed8e0",
                        "outline-variant": "#3d494a",
                        "secondary": "#cecb5b",
                        "on-primary-container": "#005256",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#060e1e",
                        "on-secondary-fixed-variant": "#4a4900",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "surface-tint": "#5ed8e0",
                        "on-secondary-container": "#fdf984",
                        "surface-container": "#182030",
                        "on-primary-fixed-variant": "#004f53",
                        "surface-bright": "#31394b",
                        "secondary-fixed": "#ebe874",
                        "primary-fixed": "#7df4fc",
                        "on-tertiary-fixed-variant": "#444749",
                        "on-secondary-fixed": "#1d1d00",
                        "on-secondary": "#333200",
                        "on-background": "#dbe2f9",
                        "error-container": "#93000a",
                        "surface": "#0b1323",
                        "secondary-fixed-dim": "#cecb5b",
                        "on-primary": "#00373a",
                        "on-error": "#690005",
                        "background": "#0b1323",
                        "inverse-primary": "#00696e",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#e1e3e5",
                        "surface-container-highest": "#2d3546",
                        "on-surface-variant": "#bcc9ca",
                        "inverse-on-surface": "#293041"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
<style>
        body {
            background-color: #0b1323;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(24, 32, 48, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased selection:bg-primary selection:text-on-primary">
<main class="relative min-h-screen flex items-center justify-center p-6 overflow-hidden">
<!-- Ambient Background Texture -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#3d494a 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
</div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-[440px]">
<!-- Branding Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-surface-container-highest rounded-xl flex items-center justify-center mb-4 border border-outline-variant/20 shadow-xl">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface uppercase mb-1">
                    Prama
                </h1>
<p class="text-on-surface-variant text-sm font-medium tracking-wide">SMART RETAIL INTELLIGENCE</p>
</div>
<!-- Form Card -->
<div class="glass-panel border border-outline-variant/20 rounded-xl p-8 shadow-2xl">
<form class="space-y-6">
<!-- Associate ID/Email -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="associate_id">Associate ID / Email</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">badge</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-1 focus:ring-primary focus:bg-surface-bright transition-all" id="associate_id" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl">lock</span>
<input class="w-full h-12 pl-12 pr-12 bg-surface-container-highest border-none rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-1 focus:ring-primary focus:bg-surface-bright transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-gradient-to-br from-primary-container to-primary text-on-primary-container font-bold rounded-lg shadow-lg shadow-primary/10 active:scale-[0.98] transition-all duration-200" type="submit">
                        LOG IN
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="mx-4 text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-[0.2em]">Enterprise Access</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Secondary Actions -->
<div class="space-y-3">
<button class="w-full h-12 flex items-center justify-center gap-3 bg-surface-container border border-outline-variant/30 rounded-lg text-on-surface text-sm font-semibold hover:bg-surface-container-highest transition-all">
<span class="material-symbols-outlined text-xl">corporate_fare</span>
                        Sign in with Corporate SSO
                    </button>
</div>
</div>
<!-- Biometric & Footer -->
<div class="mt-8 flex flex-col items-center gap-6">
<button class="group flex flex-col items-center gap-2">
<div class="w-14 h-14 rounded-full bg-surface-container-low border border-outline-variant/20 flex items-center justify-center group-hover:border-primary/50 group-hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-primary text-3xl">fingerprint</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Biometric Login</span>
</button>
<p class="text-[10px] text-on-surface-variant/40 tracking-tight text-center max-w-[280px]">
                    Authorized access only. All system activities are monitored for security and compliance purposes.
                </p>
</div>
</div>
<!-- Decorative UI Element (Heatmap Fragment) -->
<div class="absolute top-20 right-20 w-64 h-64 opacity-5 hidden lg:block">
<div class="grid grid-cols-4 gap-1 h-full">
<div class="bg-primary/20 rounded-sm"></div>
<div class="bg-primary/40 rounded-sm"></div>
<div class="bg-primary/10 rounded-sm"></div>
<div class="bg-primary/60 rounded-sm"></div>
<div class="bg-primary/30 rounded-sm"></div>
<div class="bg-primary/80 rounded-sm"></div>
<div class="bg-primary/10 rounded-sm"></div>
<div class="bg-primary/20 rounded-sm"></div>
<div class="bg-primary/50 rounded-sm"></div>
<div class="bg-primary/10 rounded-sm"></div>
<div class="bg-primary/90 rounded-sm"></div>
<div class="bg-primary/20 rounded-sm"></div>
<div class="bg-primary/10 rounded-sm"></div>
<div class="bg-primary/40 rounded-sm"></div>
<div class="bg-primary/20 rounded-sm"></div>
<div class="bg-primary/60 rounded-sm"></div>
</div>
</div>
</main>
</body></html>
